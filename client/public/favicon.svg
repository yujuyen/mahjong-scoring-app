<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mahjong tile background -->
  <rect x="8" y="4" width="48" height="56" rx="3" fill="#f5f5dc" stroke="#2c3e50" stroke-width="2"/>

  <!-- Red dragon (中) character -->
  <g fill="#dc3545">
    <!-- Outer frame -->
    <rect x="18" y="14" width="28" height="3"/>
    <rect x="18" y="45" width="28" height="3"/>
    <rect x="18" y="14" width="3" height="34"/>
    <rect x="43" y="14" width="3" height="34"/>

    <!-- Middle vertical line -->
    <rect x="30.5" y="20" width="3" height="22"/>

    <!-- Middle horizontal line -->
    <rect x="22" y="29.5" width="20" height="3"/>
  </g>

  <!-- Tile shadow/depth -->
  <rect x="8" y="4" width="48" height="56" rx="3" fill="none" stroke="#95a5a6" stroke-width="1" opacity="0.5"/>
</svg>
