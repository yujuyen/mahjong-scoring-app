services:
  # Backend API
  - type: web
    name: mahjong-scoring-api
    runtime: node
    buildCommand: npm install --build-from-source && npm run build && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: npm_config_build_from_source
        value: true
    healthCheckPath: /api/health
    disk:
      name: mahjong-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # Frontend
  - type: web
    name: mahjong-scoring-web
    runtime: node
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
